function vAP(){
  periodChip(); const rows=ap();
  let html=`<div class="panel flush"><div class="ph"><h2>Công nợ phải trả</h2><div class="spacer"></div><span class="tag n">Tự động · theo từng đơn nhập</span></div><div class="wrap"><table class="tbl"><thead><tr>
    <th>Mã đơn nhập</th><th>Nhà cung cấp / Loại</th>
    <th class="r">Phải trả (đơn đã nhập)</th>
    <th class="r">Đã chi</th>
    <th class="r" title="Còn phải trả theo các đơn đã nhập">Còn nợ theo đơn</th>
    <th class="r" title="Số đã chi trước khi có đơn — sẽ tự cấn vào đơn tiếp theo">Đã trả trước</th>
    <th class="c">Trạng thái</th><th></th>
  </tr></thead><tbody>`;
  let totPayable=0,totPaid=0,totOpen=0,totPrepaid=0;
  const allItems=payableItems();
  const bySupp={};
  allItems.forEach(it=>{ if(!bySupp[it.party]) bySupp[it.party]={name:it.name,items:[]}; bySupp[it.party].items.push(it); });
  rows.forEach(r=>{ if(!bySupp[r.code]&&r.paid>0) bySupp[r.code]={name:r.name,items:[]}; });
  if(!Object.keys(bySupp).length&&!rows.length){ html+=emptyRow(8,'↪','Chưa có công nợ phải trả'); }
  Object.keys(bySupp).forEach(suppCode=>{
    const grp=bySupp[suppCode];
    const apRow=rows.find(r=>r.code===suppCode)||{payable:0,paid:0,outstanding:0,prepaid:0};
    totPayable+=apRow.payable; totPaid+=apRow.paid;
    totOpen+=apRow.outstanding; totPrepaid+=apRow.prepaid;
    // Badge trạng thái tổng NCC
    const suppStatus = apRow.outstanding>0.5
      ? `<span class="tag r" style="font-size:10px">Còn nợ ${fmt(apRow.outstanding)} ₫</span>`
      : apRow.prepaid>0.5
        ? `<span class="tag b" style="font-size:10px">✓ Đã trả trước ${fmt(apRow.prepaid)} ₫</span>`
        : apRow.paid>0.5
          ? `<span class="tag g" style="font-size:10px">✓ Đã đủ</span>`
          : '';
    html+=`<tr style="background:var(--surface2)">
      <td colspan="2"><b>${esc(grp.name||suppCode)}</b> <span class="code" style="font-size:11px">${esc(suppCode)}</span></td>
      <td class="r num"><b>${fmt(apRow.payable)}</b></td>
      <td class="r num">${fmt(apRow.paid)}</td>
      <td class="r num ${apRow.outstanding>0.5?'neg':''}">${apRow.outstanding>0.5?fmt(apRow.outstanding):'—'}</td>
      <td class="r num ${apRow.prepaid>0.5?'':'mut'}">${apRow.prepaid>0.5?fmt(apRow.prepaid):'—'}</td>
      <td class="c">${suppStatus}</td>
      <td class="r act">${apRow.outstanding>0.5?`<button class="btn sm ghost" onclick="quickCashOut('${esc(suppCode)}')">+ Ghi chi</button>`:''}</td>
    </tr>`;
    grp.items.forEach(it=>{
      const ps=orderPayStatus(it.order);
      const stTag=ps.status==='paid'?'<span class="tag g" style="font-size:10px">✓ Đã trả</span>':ps.status==='partial'?'<span class="tag a" style="font-size:10px">Một phần</span>':'<span class="tag r" style="font-size:10px">Chưa trả</span>';
      const pendingPO=(DB.porders||[]).filter(p=>p.order===it.order&&p.party===it.party&&(p.status==='draft'||p.status==='approved')).reduce((a,p)=>a+p.amount,0);
      html+=`<tr>
        <td style="padding-left:20px"><span class="code" style="font-size:11px">${esc(it.order)}</span></td>
        <td class="mut" style="font-size:11px">${it.kind==='hàng'?'💰 Tiền hàng':it.kind.includes('quốc tế')?'🌐 VC quốc tế':it.kind.includes('nội địa')?'🚛 VC nội địa':'🚚 Vận chuyển'}</td>
        <td class="r num" style="font-size:12px">${fmt(it.amount)}</td>
        <td class="r num" style="font-size:12px">${fmt(it.amount-it.open)}</td>
        <td class="r num ${it.open>0.5?'neg':''}" style="font-size:12px">${it.open>0.5?fmt(it.open):'<span class="tag g" style="font-size:10px">✓</span>'}</td>
        <td class="r mut" style="font-size:11px">—</td>
        <td class="c">${stTag}${pendingPO>0?`<div style="font-size:10px;color:var(--muted)">LTT đang chờ: ${fmt(pendingPO)}</div>`:''}</td>
        <td class="r act" style="white-space:nowrap">${it.open>0.5?`<button class="btn sm ghost" style="font-size:11px;padding:3px 8px" onclick="editPayOrder(null,${JSON.stringify(it.order)},${JSON.stringify(it.kind)})">+ Lệnh TT</button> `:''}<button class="btn sm ghost" style="font-size:11px;padding:3px 8px" onclick="editOrder(${JSON.stringify(it.order)})">Mở đơn</button></td>
      </tr>`;
    });
  });
  html+=`</tbody><tfoot class="foot"><tr>
    <td colspan="2">Tổng công nợ</td>
    <td class="r">${money(totPayable)}</td>
    <td class="r">${money(totPaid)}</td>
    <td class="r ${totOpen>0.5?'neg':''}">${totOpen>0.5?money(totOpen):'—'}</td>
    <td class="r">${totPrepaid>0.5?money(totPrepaid):'—'}</td>
    <td colspan="2"></td>
  </tr></tfoot></table></div></div>
  ${totPrepaid>0.5?`<div class="alert a" style="margin:0"><span class="ic">i</span><div>
    Số tiền <b>Đã trả trước ${money(totPrepaid)}</b> sẽ tự động cấn trừ vào các đơn nhập tiếp theo khi được nhập vào hệ thống.
  </div></div>`:''}`;
  $('#view').innerHTML=html;
}

function clearLogo(){ DB.settings.logo=''; save(); vSettings(); toast('Đã xóa logo'); }
function loadLogo(input){
  const f=input.files[0]; if(!f)return;
  if(f.size>900000){ toast('Ảnh quá lớn (giữ dưới ~900KB)',true); return; }
  const r=new FileReader(); r.onload=()=>{ DB.settings.logo=r.result; const p=$('#s_logoPrev'); if(p){p.src=r.result;p.style.display='';} save(); toast('Đã tải logo'); }; r.readAsDataURL(f);
}
function saveSettings(){
  const s=DB.settings;
  s.exchangeRate=N($('#s_fx').value); s.margin=N($('#s_margin').value)/100; s.vatSale=N($('#s_vat').value)/100;
  s.finRate=N($('#s_fin').value)/100; s.sgaRate=N($('#s_sga').value)/100; s.contRate=N($('#s_cont').value)/100;
  s.custDays=N($('#s_cd').value); s.suppDays=N($('#s_sd').value); s.periodStart=$('#s_ps').value; s.periodEnd=$('#s_pe').value;
  if($('#s_bkurl')) s.backupScriptUrl=$('#s_bkurl').value.trim();

  s.company=$('#s_company').value.trim(); s.address=$('#s_addr').value.trim(); s.taxCode=$('#s_tax').value.trim();

function exportExcel(){
  const S=DB.settings;
  const xe=v=>String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cell=v=>{ if(typeof v==='number'&&isFinite(v)) return '<Cell><Data ss:Type="Number">'+v+'</Data></Cell>';

  const xml='<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="h"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#13203A" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style></Styles>'+sh.join('')+'</Workbook>';

function importJSON(input){
  const f=input.files[0]; if(!f)return; const r=new FileReader();

    if(!d.products||!d.settings) throw 0;

    save(); refresh(); toast('Đã nhập dữ liệu từ file sao lưu');

}

/* ---------------- shared row/delete ---------------- */
function emptyRow(cols,ic,txt){ return `<tr><td colspan="${cols}"><div class="empty"><div class="big">${ic}</div>${txt}</div></td></tr>`; }
function delRow(coll,id){
  const rec=(DB[coll]||[]).find(x=>x.id===id);
  if(rec && rec.date && isLocked(rec.date)){ toast('Kỳ kế toán đã khóa — không thể xóa dòng này',true); return; }
  confirmModal('Xóa dòng','Bạn chắc chắn muốn xóa dòng này?',()=>{ DB[coll]=DB[coll].filter(x=>x.id!==id); save(); refresh(); toast('Đã xóa'); });
}
function delEntity(coll,code){
  // referential checks
  let used=[];
  if(coll==='products'){ if(DB.lines.some(l=>l.product===code))used.push('đơn nhập'); if(DB.sales.some(s=>s.product===code))used.push('bán hàng'); if((DB.quotes||[]).some(q=>(q.lines||[]).some(l=>l.product===code)))used.push('báo giá'); }
  if(coll==='suppliers'){ if(DB.orders.some(o=>o.supplier===code))used.push('đơn nhập'); }
  if(coll==='customers'){ if(DB.sales.some(s=>s.customer===code))used.push('bán hàng'); if((DB.quotes||[]).some(q=>q.customer===code))used.push('báo giá'); }
  if(used.length){ toast('Không xóa được: đang dùng ở '+used.join(', '),true); return; }
  confirmModal('Xóa','Xóa "'+code+'"?',()=>{ DB[coll]=DB[coll].filter(x=>x.code!==code); save(); refresh(); toast('Đã xóa '+code); });
}
function delOrder(code){
  confirmModal('Xóa đơn nhập','Xóa đơn "'+code+'" và toàn bộ dòng hàng của đơn?',()=>{ DB.orders=DB.orders.filter(o=>o.code!==code); DB.lines=DB.lines.filter(l=>l.order!==code); save(); refresh(); toast('Đã xóa đơn '+code); });
}

const ENC_KEY=KEY+'_enc',SALT_KEY=KEY+'_salt';let CRYPTO_KEY=null;
function _b64(b){let s='';const u=new Uint8Array(b);for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s);}
function _ub64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function _derive(pw,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encStore(){if(!CRYPTO_KEY)return;try{const iv=crypto.getRandomValues(new Uint8Array(12));const data=new TextEncoder().encode(JSON.stringify(DB));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},CRYPTO_KEY,data);const out=new Uint8Array(iv.length+ct.byteLength);out.set(iv,0);out.set(new Uint8Array(ct),iv.length);localStorage.setItem(ENC_KEY,_b64(out.buffer));saveFailed=false;flagSaved('Đã lưu (mã hóa)');}catch(e){flagSaved('KHÔNG lưu được');if(!saveFailed){saveFailed=true;toast('Không lưu được!',true);}}}
async function _decrypt(pw){const salt=_ub64(localStorage.getItem(SALT_KEY));const key=await _derive(pw,salt);const blob=_ub64(localStorage.getItem(ENC_KEY));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:blob.slice(0,12)},key,blob.slice(12));const db=JSON.parse(new TextDecoder().decode(pt));CRYPTO_KEY=key;return db;}
async function lkGo(){const p2el=document.getElementById('lkPw2');const setup=p2el.style.display!=='none';const pw=document.getElementById('lkPw').value;const err=document.getElementById('lkErr');err.textContent='';if(pw.length<4){err.textContent='Mật khẩu tối thiểu 4 ký tự.';return;}if(setup){if(pw!==p2el.value){err.textContent='Hai lần nhập không khớp.';return;}const salt=crypto.getRandomValues(new Uint8Array(16));localStorage.setItem(SALT_KEY,_b64(salt.buffer));CRYPTO_KEY=await _derive(pw,salt);let plain=null;try{const s=localStorage.getItem(KEY);if(s)plain=JSON.parse(s);}catch(e){}DB=plain||JSON.parse(JSON.stringify(SEED));normalizeDB();await encStore();try{localStorage.removeItem(KEY);}catch(e){}_startApp();}else{try{DB=await _decrypt(pw);normalizeDB();_startApp();}catch(e){err.textContent='Sai mật khẩu.';}}}
function _startApp(){const l=document.getElementById('lock');if(l)l.style.display='none';renderNav();go('dashboard');setTimeout(()=>cloudLoad(),1500);}
function lockNow(){CRYPTO_KEY=null;location.reload();}
async function changePw(){const oldp=prompt('Mật khẩu hiện tại:');if(!oldp)return;try{await _decrypt(oldp);}catch(e){toast('Sai mật khẩu',true);return;}const n1=prompt('Mật khẩu MỚI:');if(!n1||n1.length<4){toast('Không hợp lệ',true);return;}const n2=prompt('Nhập lại:');if(n1!==n2){toast('Không khớp',true);return;}const salt=crypto.getRandomValues(new Uint8Array(16));localStorage.setItem(SALT_KEY,_b64(salt.buffer));CRYPTO_KEY=await _derive(n1,salt);await encStore();toast('Đã đổi mật khẩu');}
function bootSecure(){const has=localStorage.getItem(ENC_KEY);
  if(!has){(async()=>{const pw='Cuong1210@@';const salt=crypto.getRandomValues(new Uint8Array(16));localStorage.setItem(SALT_KEY,_b64(salt.buffer));CRYPTO_KEY=await _derive(pw,salt);DB=JSON.parse(JSON.stringify(SEED));normalizeDB();await encStore();_startApp();})();return;}
  const t=document.getElementById('lkTitle'),sub=document.getElementById('lkSub'),b=document.getElementById('lkBtn'),p2=document.getElementById('lkPw2');
  t.textContent='Đăng nhập';sub.textContent='Nhập mật khẩu để mở hệ thống ONC.';b.textContent='Mở khóa';p2.style.display='none';
  document.getElementById('lkPw').focus();
}
/* ---------------- init ---------------- */
bootSecure();
