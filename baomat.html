<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONC · Hệ thống quản trị mua bán & kế toán</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1726; --ink2:#3b4759; --muted:#7a899e; --line:#e3e8ef; --line2:#eef2f7;
  --bg:#f6f8fb; --surface:#ffffff; --panel:#f1f5f9;
  --steel:#13203a; --steel2:#1c2c4d; --steelText:#aebbd2;
  --blue:#2256d6; --blueSoft:#e8efff; --blueLine:#bcd0ff;
  --amber:#b7791f; --amberSoft:#fdf3df;
  --green:#0f8a5f; --greenSoft:#e3f6ee;
  --red:#cc2f4a; --redSoft:#fdeaed;
  --radius:11px; --shadow:0 1px 2px rgba(14,23,38,.05),0 6px 22px -12px rgba(14,23,38,.22);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Space Grotesk",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.num{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.pos{color:var(--green)} .neg{color:var(--red)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--blue);text-decoration:none}

/* layout */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--steel);color:var(--steelText);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .logo{display:flex;align-items:center;gap:10px}
.brand .mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#2f6bff,#13203a);display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.brand b{color:#fff;font-size:16px;letter-spacing:.5px}
.brand small{display:block;color:#6f7f9a;font-size:11px;margin-top:7px;line-height:1.4}
.nav{padding:10px 12px;overflow-y:auto;flex:1}
.nav .grp{color:#5f7characters;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#62718f;padding:14px 12px 6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:var(--steelText);font-size:13.5px;font-weight:500;margin:1px 0;transition:.12s}
.nav a .ic{width:17px;text-align:center;opacity:.85;font-size:14px}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.on{background:var(--blue);color:#fff;box-shadow:0 4px 14px -6px rgba(34,86,214,.9)}
.side .foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#62718f}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}

.main{min-width:0;display:flex;flex-direction:column}
.top{background:var(--surface);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
.top h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px}
.top .sub{color:var(--muted);font-size:12.5px}
.top .spacer{flex:1}
.period{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2);background:var(--panel);padding:6px 11px;border-radius:8px}
.savechip{font-size:11.5px;color:var(--green);background:var(--greenSoft);padding:6px 11px;border-radius:8px;font-weight:500}
.content{padding:24px 26px 70px;max-width:1320px;width:100%}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;transition:.12s}
.btn:hover{border-color:#c6d0de;background:#fafcff}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.pri:hover{background:#1c49bd}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink2)}
.btn.ghost:hover{background:var(--panel)}
.btn.danger{color:var(--red);border-color:var(--redSoft)}
.btn.danger:hover{background:var(--redSoft)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* cards / KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(192px,1fr));gap:13px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.kpi .lab{color:var(--muted);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.kpi .val{font-size:23px;font-weight:600;margin-top:7px;letter-spacing:-.3px}
.kpi .val small{font-size:13px;color:var(--muted);font-weight:500;margin-left:3px}
.kpi .hint{font-size:11.5px;color:var(--muted);margin-top:3px}
.kpi.accent{background:linear-gradient(160deg,#1b2c4d,#13203a);border-color:#13203a;color:#fff}
.kpi.accent .lab{color:#9fb0cc}.kpi.accent .hint{color:#8294b3}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.panel .ph{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line2)}
.panel .ph h2{font-size:14.5px;margin:0;font-weight:600}
.panel .ph .spacer{flex:1}
.panel .pb{padding:6px 0}
.panel.flush .pb{padding:0}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-weight:500;color:var(--muted);font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:#fafbfd;position:sticky;top:0}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:#f9fbfe}
.tbl td.r,.tbl th.r{text-align:right}
.tbl td.c,.tbl th.c{text-align:center}
.tbl .code{font-weight:600;font-family:"JetBrains Mono",monospace;font-size:12.5px}
.tbl .mut{color:var(--muted)}
.wrap{overflow-x:auto}
.tbl .act{opacity:0;transition:.12s}
.tbl tr:hover .act{opacity:1}
.foot td{font-weight:600;background:#fafbfd;border-top:2px solid var(--line)}

.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 9px;border-radius:20px;font-weight:500}
.tag.g{background:var(--greenSoft);color:var(--green)}
.tag.a{background:var(--amberSoft);color:var(--amber)}
.tag.r{background:var(--redSoft);color:var(--red)}
.tag.b{background:var(--blueSoft);color:var(--blue)}
.tag.n{background:var(--panel);color:var(--ink2)}

.bar{height:6px;border-radius:6px;background:var(--line);overflow:hidden;min-width:60px}
.bar i{display:block;height:100%;background:var(--blue);border-radius:6px}

.empty{padding:46px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:30px;margin-bottom:8px;opacity:.5}

/* forms / modal */
.scrim{position:fixed;inset:0;background:rgba(14,23,38,.42);backdrop-filter:blur(2px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:34px 16px;overflow-y:auto}
.scrim.on{display:flex}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:640px;box-shadow:0 24px 70px -20px rgba(14,23,38,.5);overflow:hidden;animation:pop .16s ease}
.modal.wide{max-width:920px}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
.mh{display:flex;align-items:center;padding:17px 22px;border-bottom:1px solid var(--line2)}
.mh h3{margin:0;font-size:16px;font-weight:600}.mh .spacer{flex:1}
.mh .x{border:none;background:var(--panel);width:30px;height:30px;border-radius:7px;color:var(--ink2);font-size:16px}
.mb{padding:20px 22px;max-height:66vh;overflow-y:auto}
.mf{display:flex;gap:10px;justify-content:flex-end;padding:15px 22px;border-top:1px solid var(--line2);background:#fafbfd}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 16px}
.grid .full{grid-column:1/-1}
.fld label{display:block;font-size:12.5px;font-weight:500;color:var(--ink2);margin-bottom:5px}
.fld label .req{color:var(--red)}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);transition:.12s}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blueSoft)}
.fld input.num,.fld select.num{text-align:right}
.fld .err{color:var(--red);font-size:11.5px;margin-top:4px;display:none}
.fld.bad input,.fld.bad select{border-color:var(--red);box-shadow:0 0 0 3px var(--redSoft)}
.fld.bad .err{display:block}
.fld .hint{color:var(--muted);font-size:11.5px;margin-top:4px}
.calc{background:var(--panel);border-radius:8px;padding:5px 11px;color:var(--ink2);font-weight:600;display:flex;align-items:center;min-height:38px;justify-content:flex-end}
.section-t{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:18px 0 4px;grid-column:1/-1;border-top:1px dashed var(--line);padding-top:14px}
.section-t:first-child{border-top:none;margin-top:0;padding-top:0}

.subnav{display:flex;gap:4px;background:var(--panel);padding:4px;border-radius:10px;margin-bottom:16px;width:fit-content;flex-wrap:wrap}
.subnav button{border:none;background:transparent;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;color:var(--ink2)}
.subnav button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

.search{position:relative}
.search input{padding:8px 12px 8px 32px;border:1px solid var(--line);border-radius:8px;width:230px}
.search .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}
.noresult{padding:16px;text-align:center;color:var(--muted);font-size:13px}
.tfilter{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tfilter .dfrom,.tfilter .dto{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
.tfilter .dsep{color:var(--muted);font-size:12px}
@media (max-width:560px){ .search,.search input{width:100%} .ph{flex-wrap:wrap;gap:8px} .tfilter{width:100%} }

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;box-shadow:0 12px 34px -10px rgba(0,0,0,.5);opacity:0;transition:.22s;z-index:90;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%)}
.toast.err{background:var(--red)}

.docitem{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 2px;border-bottom:1px solid var(--line2)}
.docitem:last-child{border-bottom:none}
.dlab{font-size:13px;color:var(--ink2);font-weight:500}
.dopt{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 11px;border:1px solid var(--line);border-radius:7px;cursor:pointer;user-select:none;white-space:nowrap;color:var(--muted);transition:.1s}
.dopt input{width:auto;margin:0}
.dopt:hover{border-color:#c6d0de}
.dopt.done.on{background:var(--greenSoft);border-color:var(--green);color:var(--green)}
.dopt.na.on{background:#eef1f6;border-color:#b9c3d4;color:var(--ink2)}
.docbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.docprog{font-size:12.5px;color:var(--ink2)}
.po-panel{border:1.5px solid var(--line);border-radius:12px;overflow:hidden;margin-top:4px}
.po-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--line)}
.po-title{font-weight:700;font-size:13px;color:var(--ink)}
.po-khoans{padding:10px 14px;display:flex;flex-direction:column;gap:10px}
.po-khoan{padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#fff}
.po-khoan.done{opacity:.75}
.po-khoan.pending{border-color:var(--amber);background:var(--amberSoft)}
.po-khoan-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.po-khoan-bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.po-bar-bg{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.po-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.po-khoan-nums{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink2)}
.po-ltt-hd{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surface2);border-top:1px solid var(--line)}
.po-tbl{width:100%;border-collapse:collapse}
.po-tbl td,.po-tbl th{padding:6px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.po-tbl th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surface2)}
.po-tbl tr:last-child td{border-bottom:none}
.po-form{background:#f0f7ff;border:1.5px solid #2256d620;border-radius:10px;padding:14px;margin-top:8px}
.po-form-hd{font-weight:700;font-size:12.5px;color:var(--blue);margin-bottom:10px}
.po-form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.po-form-fld{display:flex;flex-direction:column;gap:4px}
.po-form-fld label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.po-form-fld input{padding:7px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit}
.po-form-fld.wide{grid-column:1/-1}
.po-form-acts{display:flex;gap:8px;justify-content:flex-end}
@media(max-width:600px){.po-form-grid{grid-template-columns:1fr 1fr}}
.po-empty{padding:10px 14px;font-size:12px;color:var(--muted)}
.dt-note{text-transform:none;letter-spacing:0;font-weight:400;color:var(--muted)}
.cgrow{display:grid;grid-template-columns:1.25fr 1.1fr .55fr 1.1fr;gap:8px;align-items:center;margin-bottom:8px}
.cgrow.head{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:2px}
.cgrow .cglbl{font-size:13px;color:var(--ink2);font-weight:500}
.cgrow input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;width:100%;box-sizing:border-box}
@media (max-width:560px){ .cgrow{grid-template-columns:1fr 1fr} .cgrow .cglbl{grid-column:1/-1;font-weight:600} .cgrow.head{display:none} }
@media (max-width:560px){.docitem{grid-template-columns:1fr;gap:5px}.dopt{justify-content:center}}

.linerow{display:grid;grid-template-columns:1.2fr .4fr .65fr .65fr .8fr .65fr .7fr .7fr .45fr .95fr 30px;gap:5px;align-items:center;margin-bottom:7px}
.linerow.head{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:3px}
.linerow input,.linerow select{padding:7px 8px;border:1px solid var(--line);border-radius:7px;width:100%;box-sizing:border-box}
.linerow .del{border:none;background:var(--redSoft);color:var(--red);width:30px;height:32px;border-radius:7px}
@media (max-width:720px){ .linerow{grid-template-columns:1fr 1fr 1fr;gap:6px} .linerow>select{grid-column:1/-1} .linerow.head{display:none} }
.miniline{font-size:11.5px;color:var(--muted);text-align:right;padding-right:42px;margin:-3px 0 8px}
.qline{display:grid;grid-template-columns:1.7fr .6fr .8fr 1.5fr 34px;gap:8px;align-items:center;margin-bottom:7px}
.qline.head{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:3px}
.qline input,.qline select{padding:7px 9px;border:1px solid var(--line);border-radius:7px;width:100%}
.qline .del{border:none;background:var(--redSoft);color:var(--red);width:30px;height:32px;border-radius:7px}
@media (max-width:620px){.qline{grid-template-columns:1fr 1fr;gap:6px}.qline>div{grid-column:1/-1}}
/* print */
#printArea{display:none}
@media print{
  @page{size:A4;margin:14mm 12mm}
  body * {visibility:hidden}
  #printArea, #printArea * {visibility:visible}
  #printArea{display:block;position:absolute;left:0;top:0;width:100%}
}
.pq{font-family:"Space Grotesk",Arial,sans-serif;color:#111;font-size:12.5px;line-height:1.45;max-width:790px;margin:0 auto;padding:6px 10px}
.pq-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;border-bottom:2.5px solid #13203a;padding-bottom:12px}
.pq-co{display:flex;gap:12px;align-items:flex-start}
.pq-logo{height:52px;max-width:170px;object-fit:contain}
.pq-mark{width:46px;height:46px;border-radius:9px;background:linear-gradient(135deg,#2f6bff,#13203a);color:#fff;font-weight:700;font-size:18px;display:flex;align-items:center;justify-content:center}
.pq-name{font-size:15.5px;font-weight:700;color:#13203a;text-transform:uppercase;letter-spacing:.3px;max-width:330px}
.pq-info{font-size:11px;color:#444;margin-top:2px}
.pq-titlebox{text-align:right;min-width:215px}
.pq-title{font-size:25px;font-weight:700;color:#13203a;letter-spacing:3px;line-height:1}
.pq-sub{font-size:11px;letter-spacing:3px;color:#777;margin-bottom:6px}
.pq-no{margin-left:auto;border-collapse:collapse;font-size:11px}
.pq-no td{border:1px solid #ccc;padding:3px 8px}
.pq-no td:first-child{color:#555;background:#f4f6f9}
.pq-to{margin:14px 0 4px;border:1px solid #dde3ec;border-left:3px solid #2256d6;border-radius:5px;padding:9px 12px;background:#fbfcfe}
.pq-to .lbl{color:#555;font-weight:600}
.pq-row2{display:flex;gap:18px;flex-wrap:wrap}
.pq-subj{margin-top:4px}
.pq-intro{margin:12px 2px;font-size:12px}
.pq-tbl{width:100%;border-collapse:collapse;font-size:12px}
.pq-tbl th,.pq-tbl td{border:1px solid #b9c2d0;padding:6px 8px;vertical-align:top}
.pq-tbl thead th{background:#13203a;color:#fff;text-align:left;font-weight:600;font-size:11.5px}
.pq-tbl .en{font-weight:400;font-size:9.5px;opacity:.8;font-style:italic}
.pq-tbl .ce{text-align:center}.pq-tbl .rr{text-align:right;font-variant-numeric:tabular-nums}
.pq-tbl .cd{font-weight:600;white-space:nowrap}
.pq-tbl tbody tr:nth-child(even){background:#f6f8fb}
.pq-tbl tfoot td{background:#eef1f6;font-weight:500}
.pq-tbl tfoot tr.tot td{background:#dbe3f4;font-size:13px}
.pq-words{margin:8px 2px;font-size:12px}
.pq-terms{margin:14px 0 6px}
.pq-terms-t{font-weight:700;color:#13203a;font-size:11.5px;letter-spacing:.5px;border-bottom:1px solid #cbd3e0;padding-bottom:3px;margin-bottom:5px}
.pq-terms ol{margin:0;padding-left:18px;font-size:11.5px}
.pq-terms li{margin-bottom:3px}
.pq-bank,.pq-note{font-size:11.5px;margin-top:6px}
.pq-sign{display:flex;justify-content:space-between;margin-top:26px;text-align:center;page-break-inside:avoid}
.pq-sign-col{width:46%}
.pq-sign-r{font-weight:700;font-size:12px;color:#13203a}
.pq-sign-r .en{font-weight:400;font-size:10px;color:#777;font-style:italic}
.pq-sign-sp{height:62px}
.pq-sign-name{font-weight:600;border-top:1px dotted #aaa;display:inline-block;padding-top:3px;min-width:120px}

.alert{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border-radius:9px;font-size:13px;margin:0 14px 9px}
.alert.a{background:var(--amberSoft);color:#7a5310}
.alert.r{background:var(--redSoft);color:#8f1f33}
.alert.g{background:var(--greenSoft);color:#0a5c40}
.alert .ic{font-size:15px;margin-top:1px}

@media (max-width:880px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:-260px;width:236px;z-index:60;transition:.2s}
  .side.open{left:0}
  .content{padding:18px 14px 70px}
  .top{padding:11px 14px}
  .menubtn{display:inline-flex!important}
}

async function cloudLoad(){
  const url = DB.settings.backupScriptUrl||'';
  if(!url) return;
  const key = DB.settings.backupKey||'onc2026';
  try{
    _cloudStatus='syncing'; _updateCloudDot();
    const res = await fetch(`${url}?action=load&key=${encodeURIComponent(key)}`);
    const json = await res.json();
    _cloudStatus='ok'; _updateCloudDot();
    if(!json.ok || !json.data) return;
    const cloudDB = json.data;
    const cloudTs = (cloudDB.settings&&cloudDB.settings.lastSaved)||'';
    const localTs = (DB.settings&&DB.settings.lastSaved)||'';
    if(cloudTs > localTs){
      const diffMin = Math.round((new Date(cloudTs)-new Date(localTs))/60000);
      const ok = confirm(`☁ Cloud có dữ liệu mới hơn ${diffMin} phút.\nTải về thay thế dữ liệu thiết bị này?`);
      if(ok){ DB=cloudDB; normalizeDB(); await encStore(); refresh(); toast('✓ Đã tải dữ liệu mới nhất từ cloud'); }
    }
  }catch(e){ _cloudStatus='err'; _updateCloudDot(); }
}

const $=s=>document.querySelector(s);
const N=x=>{
  if(typeof x==='number') return isNaN(x)?0:x;
  if(x==null) return 0;
  let str=String(x).trim().replace(/[\s₫]/g,'').replace(/đ|VND/gi,'');
  if(str==='') return 0;
  const dots=(str.match(/\./g)||[]).length, commas=(str.match(/,/g)||[]).length;
  if(dots>=2 && commas===0) str=str.replace(/\./g,'');                 // 1.000.000 (nhóm nghìn kiểu VN)
  else if(commas>=2 && dots===0) str=str.replace(/,/g,'');             // 1,000,000 (nhóm nghìn kiểu Anh)
  else if(dots>=1 && commas>=1){                                       // có cả hai: dấu sau cùng là thập phân
    if(str.lastIndexOf(',')>str.lastIndexOf('.')) str=str.replace(/\./g,'').replace(/,/g,'.');
    else str=str.replace(/,/g,'');
  }
  else if(commas===1 && dots===0) str=str.replace(',', '.');           // 0,1 / 1,5 (thập phân kiểu VN)
  const v=parseFloat(str); return isNaN(v)?0:v;
};

function docTienBangChu(amount){
  amount=Math.round(N(amount));
  if(!amount) return 'Không đồng.';
  const D=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  function readTriple(n, showHundred){
    const tr=Math.floor(n/100), ch=Math.floor((n%100)/10), dv=n%10; let parts=[];
    if(tr>0 || showHundred) parts.push(D[tr]+' trăm');
    if(ch>1){ let t=D[ch]+' mươi'; if(dv===1)t+=' mốt'; else if(dv===5)t+=' lăm'; else if(dv>0)t+=' '+D[dv]; parts.push(t); }
    else if(ch===1){ let t='mười'; if(dv===5)t+=' lăm'; else if(dv>0)t+=' '+D[dv]; parts.push(t); }
    else if(dv>0){ parts.push(((tr>0||showHundred)?'lẻ ':'')+D[dv]); }
    return parts.join(' ');
  }
  const scales=['','nghìn','triệu','tỷ'];
  let groups=[], n=amount; while(n>0){ groups.unshift(n%1000); n=Math.floor(n/1000); }
  const len=groups.length; let out=[];
  for(let i=0;i<len;i++){ const g=groups[i]; const sc=len-1-i; if(g===0)continue;
    out.push((readTriple(g, i!==0)+' '+(scales[sc]||'')).trim()); }
  let res=out.join(' ').replace(/\s+/g,' ').trim();
  return res.charAt(0).toUpperCase()+res.slice(1)+' đồng.';
}

/* ---------------- ENGINE (mirrors workbook logic, fixed) ---------------- */
function lineValue(l){
  // Tỷ giá mua hàng (dùng tính giá trị hàng VND)
  const fx = N(l.fx)>0 ? N(l.fx) : N(DB.settings.exchangeRate);
  // Tỷ giá đóng thuế HQ (có thể khác tỷ giá mua — do HQ công bố riêng)
  const fxTax = N(l.fxTax)>0 ? N(l.fxTax) : fx;
  // Giá VND mua hàng
  const priceVND = N(l.priceVND)>0 ? N(l.priceVND) : N(l.priceFC)*fx;
  // Giá trị hàng tính theo tỷ giá mua
  const value = N(l.qty)*priceVND;
  // Thuế NK: ưu tiên số tiền nhập tay (từ tờ khai HQ), fallback tính theo tỷ lệ % × giá trị theo tỷ giá thuế
  const valueTax = N(l.qty)*(N(l.priceVND)>0 ? N(l.priceVND) : N(l.priceFC)*fxTax);
  const duty = N(l.dutyAmt)>0 ? N(l.dutyAmt) : valueTax*N(l.duty);
  // VAT NK: ưu tiên số tiền nhập tay, fallback tính = (giá trị theo tỷ giá thuế + thuế NK) × %
  const importVATAmt = N(l.importVATAmt)>0 ? N(l.importVATAmt) : (valueTax+duty)*N(l.importVAT);
  // importVAT trả về số tiền (không phải %) để dùng trong orderCalc và vatMonthly
  // vatPurchase: VAT trên HĐ mua nội địa = (value+duty)*importVAT% hoặc importVATAmt
  // Dùng khi goodsOwed cần tính VAT phải trả NCC VN
  const vatPurchase = N(l.importVATAmt)>0 ? N(l.importVATAmt) : (value+duty)*N(l.importVAT);
  return {fx,fxTax,priceVND,value,valueTax,duty,importVAT:importVATAmt,vatPurchase};
}
function orderCalc(code){
  const o=ordOf(code)||{};
  const lines=DB.lines.filter(l=>l.order===code).map(l=>({...l,...lineValue(l)}));
  const totalValue=lines.reduce((s,l)=>s+l.value,0);
  const logistics=N(o.freight)+N(o.customs)+N(o.domestic)+N(o.insurance)+N(o.bankFee)+N(o.other);
  const finRate=N(o.finRate)||N(DB.settings.finRate);
  const sgaRate=N(o.sgaRate)||N(DB.settings.sgaRate);
  const contRate=N(o.contRate)||N(DB.settings.contRate);
  const finCost=totalValue*finRate, sga=totalValue*sgaRate, cont=totalValue*contRate;
  const extra=logistics+finCost+sga+cont;
  lines.forEach(l=>{
    l.weight = totalValue? l.value/totalValue : 0;
    l.allocLogistics=l.weight*logistics; l.allocFin=l.weight*finCost;
    l.allocSga=l.weight*sga; l.allocCont=l.weight*cont;
    l.inbound = l.value + l.duty + l.weight*extra;
    l.unitCost = N(l.qty)? l.inbound/N(l.qty) : 0;
  });
  const totalDuty=lines.reduce((s,l)=>s+l.duty,0);
  const totalVAT=lines.reduce((s,l)=>s+l.importVAT,0);
  const inbound=lines.reduce((s,l)=>s+l.inbound,0);
  const qty=lines.reduce((s,l)=>s+N(l.qty),0);
  const warehoused=!!o.dateWH;
  return {order:o,lines,totalValue,logistics,finCost,sga,cont,extra,totalDuty,totalVAT,inbound,qty,warehoused};
}

// inventory weighted-average over reporting period
function inventory(){
  const ps=DB.settings.periodStart, pe=DB.settings.periodEnd;
  const map={};
  DB.products.forEach(p=>{
    map[p.code]={code:p.code,p,beginQty:N(p.initQty),beginValue:N(p.initValue),
      inQty:0,inValue:0,pendingQty:0,pendingValue:0};
  });
  // inbound from warehoused order lines
  DB.orders.forEach(o=>{
    const oc=orderCalc(o.code);
    oc.lines.forEach(l=>{
      const m=map[l.product]; if(!m) return;
      if(o.dateWH){
        const wh=o.dateWH;
        if(wh<ps){ m.beginQty+=N(l.qty); m.beginValue+=l.inbound; }
        else if(wh<=pe){ m.inQty+=N(l.qty); m.inValue+=l.inbound; }
        else { m.inQty+=N(l.qty); m.inValue+=l.inbound; } // future warehouse still in stock
      } else {
        m.pendingQty+=N(l.qty); m.pendingValue+=l.inbound;
      }
    });
  });
  // begin avg (trước khi trừ bán hàng trước kỳ), rồi trừ cả SL lẫn giá trị theo giá vốn đầu kỳ
  Object.values(map).forEach(m=>{ m._beginAvg = m.beginQty? m.beginValue/m.beginQty : 0; });
  DB.sales.forEach(s=>{
    const m=map[s.product]; if(!m) return;
    if(s.date<ps){ m.beginQty-=N(s.qty); m.beginValue-=N(s.qty)*m._beginAvg; }
  });
  Object.values(map).forEach(m=>{
    m.availQty=m.beginQty+m.inQty;
    m.availValue=m.beginValue+m.inValue;
    m.avgCost = m.availQty? m.availValue/m.availQty : 0;
    m.soldQty=0;
  });
  DB.sales.forEach(s=>{
    const m=map[s.product]; if(!m) return;
    if(s.date>=ps && s.date<=pe) m.soldQty+=N(s.qty);
  });
  Object.values(map).forEach(m=>{
    m.cogs=m.soldQty*m.avgCost;
    m.endQty=m.availQty-m.soldQty;
    m.endValue=m.availValue-m.cogs;
  });
  return map;
}
function avgCost(code){ const m=inventory()[code]; return m?m.avgCost:0; }
// price list
function priceList(){
  const inv=inventory(); const s=DB.settings;
  return DB.products.map(p=>{
    const cost=inv[p.code]?inv[p.code].avgCost:0;
    const full=cost*(1+N(s.finRate)+N(s.sgaRate)+N(s.contRate));
    const margin=N(s.margin);
    const sugg = margin<1? full/(1-margin) : full;
    const vat=N(p.vatSale)||N(s.vatSale);
    return {code:p.code,nameVI:nameVI(p),cost,full,margin,sugg,vat,suggVat:sugg*(1+vat),gp:sugg-full};
  });
}
function suggestedPrice(code){ const r=priceList().find(x=>x.code===code); return r?r.sugg:0; }
// sales rows enriched
function salesRows(){
  const inv=inventory(); const pl=priceList();
  return DB.sales.map(s=>{
    const p=prodOf(s.product); const c=custOf(s.customer);
    const revenue=N(s.qty)*N(s.price);
    const sugg = (pl.find(x=>x.code===s.product)||{}).sugg||0;
    const vatRate = p? (N(p.vatSale)||N(DB.settings.vatSale)) : N(DB.settings.vatSale);
    const vat=revenue*vatRate;
    const cost=inv[s.product]?inv[s.product].avgCost:0;
    const cogs=N(s.qty)*cost;
    const days=c?N(c.collectDays):N(DB.settings.custDays);
    const due=s.date? addDays(s.date,days):'';
    return {...s,custName:c?c.name:'',prodName:p?nameVI(p):s.product,revenue,sugg,diff:N(s.price)-sugg,
      vatRate,vat,total:revenue+vat,cost,cogs,gp:revenue-cogs,due,days};
  });
}
function addDays(iso,d){ const dt=new Date(iso); dt.setDate(dt.getDate()+N(d)); return dt.toISOString().slice(0,10); }
// AR / AP
function ar(){
  return DB.customers.map(c=>{
    const invoiced=salesRows().filter(s=>s.customer===c.code).reduce((s,x)=>s+x.total,0);
    const collected=DB.cash.filter(x=>x.objCode===c.code).reduce((s,x)=>s+N(x.cashIn),0);
    return {code:c.code,name:c.name,invoiced,collected,outstanding:invoiced-collected};
  });
}
function goodsOwed(o){
  // Tiền phải trả NCC hàng:
  //   NCC Việt Nam: giá trị hàng + thuế NK + VAT trên HĐ mua (ONC trả cả VAT cho NCC)
  //   NCC nước ngoài (JZ...): chỉ giá trị hàng + thuế NK (VAT NK nộp HQ riêng)
  const sup = supOf(o.supplier)||{};
  const isDomestic = (sup.country||'').includes('Việt') || (sup.country||'').toLowerCase()==='vn';
  const calc = orderCalc(o.code);
  return calc.lines.reduce((s, l) => {
    const vat = isDomestic ? (l.vatPurchase||0) : 0;
    return s + l.value + l.duty + vat;
  }, 0);
}
function carrierOwed(o){
  // Tính nợ cho từng ĐVVC (quốc tế / nội địa / cùng một)
  const rows=[];
  if(o.carrier){
    const amt=N(o.freight)+N(o.freightVatAmt);
    if(amt>0) rows.push({code:o.carrier,kind:'quốc tế',amount:amt});
  }
  if(o.domesticCarrier){
    const amt=N(o.domestic)+N(o.domesticVatAmt);
    if(amt>0){
      // Nếu cùng ĐVVC → cộng gộp
      const same=rows.find(r=>r.code===o.domesticCarrier);
      if(same) same.amount+=amt;
      else rows.push({code:o.domesticCarrier,kind:'nội địa',amount:amt});
    }
  }
  return rows; // [{code, kind, amount}]
}
function ap(){
  return DB.suppliers.map(s=>{
    // Tổng phải trả theo tất cả đơn đã nhập
    let payable=0;
    DB.orders.forEach(o=>{
      if(o.supplier===s.code) payable+=goodsOwed(o);
      carrierOwed(o).forEach(cr=>{ if(cr.code===s.code) payable+=cr.amount; });
    });
    // Tổng đã chi (chỉ Thương mại)
    const paid=DB.cash.filter(x=>x.objCode===s.code && N(x.cashOut)>0
      && (x.objType==='Thương mại'||!x.objType||x.order)).reduce((a,x)=>a+N(x.cashOut),0);
    // Còn lại theo đơn đã nhập = tổng open của payableItems
    const items=payableItems().filter(it=>it.party===s.code);
    const openByOrder=items.reduce((a,it)=>a+it.open,0);
    // Đã trả trước (chờ cấn vào đơn chưa nhập) = paid - (payable - openByOrder)
    const prepaid=Math.max(0, paid-payable+openByOrder);
    return {code:s.code,name:s.name,payable,paid,
      outstanding:openByOrder,   // chỉ hiện số thực sự còn nợ theo đơn đã nhập
      prepaid,                    // số đã trả trước chờ cấn đơn sau
      overpaid:paid>payable};
  }).filter(s=>s.payable>0||s.paid>0);
}
// cash with running balance (sorted by date then id)
function cashRows(){
  const rows=[...DB.cash].sort((a,b)=> (a.date===b.date? a.id-b.id : (a.date<b.date?-1:1)));
  let bal=0;
  return rows.map(r=>{ const net=N(r.cashIn)-N(r.cashOut); bal+=net; return {...r,net,bal}; });
}
function cashBalance(){ const r=cashRows(); return r.length? r[r.length-1].bal : 0; }
// monthly
function monthly(year){
  const out=[];
  for(let m=1;m<=12;m++){
    const lo=`${year}-${String(m).padStart(2,'0')}-01`;
    const hi=m===12?`${year+1}-01-01`:`${year}-${String(m+1).padStart(2,'0')}-01`;
    const sr=salesRows().filter(s=>s.date>=lo&&s.date<hi);
    const rev=sr.reduce((a,s)=>a+s.revenue,0), cogs=sr.reduce((a,s)=>a+s.cogs,0);
    const op=DB.opex.filter(o=>o.date>=lo&&o.date<hi).reduce((a,o)=>a+N(o.amount),0);
    const cin=DB.cash.filter(c=>c.date>=lo&&c.date<hi).reduce((a,c)=>a+N(c.cashIn),0);
    const cout=DB.cash.filter(c=>c.date>=lo&&c.date<hi).reduce((a,c)=>a+N(c.cashOut),0);
    out.push({m,rev,cogs,gp:rev-cogs,op,profit:rev-cogs-op,cin,cout,net:cin-cout,margin:rev?(rev-cogs)/rev:0});
  }
  return out;
}

/* ---------------- AVAILABILITY (ATP) ENGINE ---------------- */
function openQuotes(){ return (DB.quotes||[]).filter(q=>q.status==='draft'||q.status==='sent'); }
function committedQty(code, exceptId){
  let s=0; openQuotes().forEach(q=>{ if(q.id===exceptId)return; (q.lines||[]).forEach(l=>{ if(l.product===code) s+=N(l.qty); }); });
  s += soOpenQty(code);
  return s;
}
function incomingFor(code){
  const rows=[];
  DB.orders.forEach(o=>{ if(o.dateWH) return; DB.lines.filter(l=>l.order===o.code&&l.product===code).forEach(l=>{
    rows.push({qty:N(l.qty),eta:o.dateETA||o.dateShip||'',order:o.code,supplier:o.supplier}); }); });
  const qty=rows.reduce((a,r)=>a+r.qty,0);
  const dates=rows.map(r=>r.eta).filter(Boolean).sort();
  return {qty,nextEta:dates[0]||'',detail:rows};
}
function availability(code, exceptId){
  const inv=inventory()[code]||{endQty:0,avgCost:0};
  const onHand=N(inv.endQty), committed=committedQty(code,exceptId);
  const inc=incomingFor(code);
  return {onHand,committed,atp:onHand-committed,incoming:inc.qty,nextEta:inc.nextEta,incDetail:inc.detail,avgCost:inv.avgCost};
}
function suggestedPriceQ(code){ const r=priceList().find(x=>x.code===code); return r&&r.cost>0? r.sugg : 0; }
function lineStatus(code, qty, exceptId){
  const av=availability(code,exceptId); const need=N(qty);
  if(av.atp>=need) return {kind:'ok',av,short:0,html:`<span class="tag g">Đủ hàng (${fmt(av.atp)})</span>`};
  if(av.atp+av.incoming>=need) return {kind:'incoming',av,short:need-av.atp,html:`<span class="tag a">Chờ về${av.nextEta?' '+dshow(av.nextEta):''}</span>`};
  return {kind:'short',av,short:need-av.atp-av.incoming,html:`<span class="tag r">Thiếu ${fmt(need-av.atp-av.incoming)}</span>`};
}

/* ================= KIỂM SOÁT & DÒNG TIỀN ================= */
function nowTS(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }
function withTS(obj, existing){ obj.createdAt=(existing&&existing.createdAt)?existing.createdAt:nowTS(); obj.updatedAt=nowTS(); return obj; }
function isLocked(dateStr){ const L=DB.settings.lockDate; return !!(L && dateStr && dateStr<=L); }

// open items with due dates (FIFO settlement)
function openReceivables(){
  const out=[];
  DB.customers.forEach(c=>{
    const items=salesRows().filter(s=>s.customer===c.code).map(s=>({party:c.code,name:c.name,date:s.date,due:s.due,amount:s.total,open:s.total})).sort((a,b)=>a.date<b.date?-1:1);
    let coll=DB.cash.filter(x=>x.objCode===c.code).reduce((a,x)=>a+N(x.cashIn),0);
    for(const it of items){ if(coll<=0)break; const ap=Math.min(it.open,coll); it.open-=ap; coll-=ap; }
    items.forEach(it=>{ if(it.open>0.5) out.push(it); });
  });
  return out;
}
function payableItems(){
  const all=[];
  DB.suppliers.forEach(s=>{
    const items=[];
    DB.orders.forEach(o=>{
      const base=o.dateWH||o.dateETA||o.datePI||'';
      const due=base?addDays(base,N(s.payDays)):'';
      // Tiền hàng
      if(o.supplier===s.code){
        const amt=goodsOwed(o);
        if(amt>0) items.push({party:s.code,name:s.name,order:o.code,kind:'hàng',date:base,due,amount:amt,open:amt,ref:o.code});
      }
      // Tiền vận chuyển (quốc tế + nội địa)
      carrierOwed(o).forEach(cr=>{
        if(cr.code===s.code){
          const label='vận chuyển '+cr.kind;
          items.push({party:s.code,name:s.name,order:o.code,kind:label,date:base,due,amount:cr.amount,open:cr.amount,ref:o.code+' · '+label});
        }
      });
    });
    // Cấn trừ: chỉ cashOut loại Thương mại (tiền hàng + vận chuyển)
    const cashRows=DB.cash.filter(x=>x.objCode===s.code && N(x.cashOut)>0
      && (x.objType==='Thương mại'||!x.objType||x.order));
    let pool=0;
    cashRows.forEach(x=>{ let amt=N(x.cashOut);
      if(x.order){ items.filter(it=>it.order===x.order).forEach(it=>{ const a=Math.min(it.open,amt); it.open-=a; amt-=a; }); pool+=amt; }
      else pool+=amt;
    });
    items.sort((a,b)=>a.date<b.date?-1:1);
    for(const it of items){ if(pool<=0)break; const a=Math.min(it.open,pool); it.open-=a; pool-=a; }
    items.forEach(it=>all.push(it));
  });
  return all;
}
function openPayables(){ return payableItems().filter(it=>it.open>0.5); }
function orderPayStatus(code){
  const items=payableItems().filter(it=>it.order===code);
  const amount=items.reduce((a,it)=>a+it.amount,0);
  const open=items.reduce((a,it)=>a+it.open,0);
  const paid=amount-open;
  const status = amount<=0.5? 'none' : (open<=0.5? 'paid' : (paid>0.5? 'partial':'unpaid'));
  return {amount,paid,open,status,items};
}
function ageBucket(due){
  if(!due) return 'Quá hạn >60';
  const today=todayISO(); if(due>=today) return 'Chưa đến hạn';
  const days=Math.floor((new Date(today)-new Date(due))/86400000);
  if(days<=30) return 'Quá hạn 1–30'; if(days<=60) return 'Quá hạn 31–60'; return 'Quá hạn >60';
}
function cashForecast(weeks){
  const start=cashBalance(), today=todayISO(); const ar=openReceivables(), ap=openPayables(); let bal=start; const rows=[];
  const ovIn=ar.filter(x=>!x.due||x.due<today).reduce((a,x)=>a+x.open,0);
  const ovOut=ap.filter(x=>!x.due||x.due<today).reduce((a,x)=>a+x.open,0);
  bal+=ovIn-ovOut; rows.push({label:'Quá hạn / đến nay',inflow:ovIn,outflow:ovOut,bal});
  for(let i=0;i<weeks;i++){ const s=addDays(today,i*7), e=addDays(today,(i+1)*7);
    const inf=ar.filter(x=>x.due&&x.due>=s&&x.due<e).reduce((a,x)=>a+x.open,0);
    const outf=ap.filter(x=>x.due&&x.due>=s&&x.due<e).reduce((a,x)=>a+x.open,0);
    bal+=inf-outf; rows.push({label:'Tuần '+(i+1)+' · '+dshow(s),inflow:inf,outflow:outf,bal}); }
  return {start,rows};
}
function vatMonthly(year){
  const rows=[];
  for(let m=1;m<=12;m++){
    const lo=year+'-'+String(m).padStart(2,'0')+'-01';
    const hi=m===12?(year+1)+'-01-01':year+'-'+String(m+1).padStart(2,'0')+'-01';
    // VAT đầu ra: thu từ khách khi bán
    const out=salesRows().filter(s=>s.date>=lo&&s.date<hi).reduce((a,s)=>a+s.vat,0);
    // VAT chi phí đầu vào
    const opv=DB.opex.filter(o=>o.date>=lo&&o.date<hi).reduce((a,o)=>a+N(o.amount)*N(o.vat),0);
    // VAT NK: đã nộp thực tế tại cửa khẩu (tiền ra khỏi TK ngay)
    let imp=0;
    DB.orders.forEach(o=>{
      if(o.dateWH&&o.dateWH>=lo&&o.dateWH<hi){
        orderCalc(o.code).lines.forEach(l=>imp+=l.importVAT);
        imp+=N(o.freightVatAmt)+N(o.domesticVatAmt);
      }
    });
    // VAT phải nộp nhà nước cuối kỳ = đầu ra − (đầu vào chi phí + VAT NK đã nộp HQ)
    // Lưu ý: VAT NK đã nộp HQ được khấu trừ vào số phải nộp nhà nước
    // VAT mua hàng nội địa: NCC VN xuất HĐ VAT → ONC được khấu trừ khi kê khai
    let vatPurchaseDomestic=0;
    DB.orders.forEach(oo=>{
      if(oo.dateWH&&oo.dateWH>=lo&&oo.dateWH<hi){
        const sup=supOf(oo.supplier)||{};
        const isDom=(sup.country||'').includes('Việt')||(sup.country||'').toLowerCase()==='vn';
        if(isDom) orderCalc(oo.code).lines.forEach(ll=>{ vatPurchaseDomestic+=ll.vatPurchase||0; });
      }
    });
    const inpDomestic = opv + vatPurchaseDomestic;
    const vatPayable = out - inpDomestic - imp; // dương = phải nộp thêm; âm = được bù kỳ sau
    // Ảnh hưởng dòng tiền thực = Thu từ khách - Đã nộp HQ - Nộp nhà nước (nếu >0)
    const cashImpact = out - imp - Math.max(0, vatPayable);
    rows.push({m,out,opv:inpDomestic,imp,inp:inpDomestic+imp,
               net:out-inpDomestic-imp,vatPayable,cashImpact,vatPurchaseDomestic});
  }
  return rows;
}
function profitByCustomer(){ const m={}; salesRows().forEach(s=>{ const k=s.customer; (m[k]=m[k]||{code:k,name:s.custName||k,rev:0,cogs:0,qty:0}); m[k].rev+=s.revenue; m[k].cogs+=s.cogs; m[k].qty+=N(s.qty); }); return Object.values(m).map(x=>({...x,gp:x.rev-x.cogs,margin:x.rev?(x.rev-x.cogs)/x.rev:0})).sort((a,b)=>b.gp-a.gp); }
function profitByProduct(){ const m={}; salesRows().forEach(s=>{ const k=s.product; (m[k]=m[k]||{code:k,name:s.prodName||k,rev:0,cogs:0,qty:0}); m[k].rev+=s.revenue; m[k].cogs+=s.cogs; m[k].qty+=N(s.qty); }); return Object.values(m).map(x=>({...x,gp:x.rev-x.cogs,margin:x.rev?(x.rev-x.cogs)/x.rev:0})).sort((a,b)=>b.gp-a.gp); }
// sales orders (backlog)
function soOpenQty(code){ let s=0; (DB.sorders||[]).forEach(so=>{ if(so.status==='delivered'||so.status==='cancelled')return; (so.lines||[]).forEach(l=>{ if(l.product===code) s+=Math.max(0,N(l.qty)-N(l.deliveredQty)); }); }); return s; }
function soStatus(so){ const tot=(so.lines||[]).reduce((a,l)=>a+N(l.qty),0); const del=(so.lines||[]).reduce((a,l)=>a+N(l.deliveredQty),0); if(so.status==='cancelled')return'cancelled'; if(del<=0)return'open'; if(del>=tot)return'delivered'; return'partial'; }

function quickPayOrder(orderCode, kind, party){
  const open=payableItems().filter(it=>it.order===orderCode&&it.kind===kind&&it.party===party).reduce((a,it)=>a+it.open,0);
  if(!(open>0.5)){ toast('Không còn số tiền cần tạo lệnh',true); return; }
  const kindLabel=k=>k==='hàng'?'Tiền hàng':k.includes('quốc tế')?'VC quốc tế':k.includes('nội địa')?'VC nội địa':'Vận chuyển';
  const note=(kind==='hàng'?'Thanh toán tiền hàng':'Thanh toán '+kindLabel(kind).toLowerCase())+' đơn '+orderCode;
  const obj={id:nid(),code:nextPOrderCode(),date:todayISO(),order:orderCode,party,
    amount:Math.round(open),dueDate:'',status:'draft',paidDate:'',bankRef:'',
    approvedBy:'',approvedAt:'',rejectReason:'',note};
  DB.porders.push(obj); save();
  fillPayInfo(orderCode);
  toast('✓ Đã tạo lệnh '+obj.code+' · Chờ duyệt');
}
function poParties(oc){
  const o=ordOf(oc); if(!o)return [];
  const arr=[];
  const s=supOf(o.supplier); if(s)arr.push({code:s.code,name:s.name,role:'hàng'});
  if(o.carrier){ const c=supOf(o.carrier); if(c&&!arr.find(x=>x.code===c.code)) arr.push({code:c.code,name:c.name,role:'VC quốc tế'}); }
  if(o.domesticCarrier){ const d=supOf(o.domesticCarrier); if(d&&!arr.find(x=>x.code===d.code)) arr.push({code:d.code,name:d.name,role:'VC nội địa'}); }
  return arr;
}

function editPayOrder(id, prefillOrder, prefillKind){
  const p=id?DB.porders.find(x=>x.id===id):{code:nextPOrderCode(),date:todayISO(),order:prefillOrder||'',party:'',amount:0,dueDate:'',status:'draft',paidDate:'',bankRef:'',approvedBy:'',approvedAt:'',rejectReason:'',note:''};
  // Nếu prefill từ đơn: chọn đúng party theo kind (hàng → NCC, vận chuyển → carrier)
  if(!id && prefillOrder && prefillKind){
    const ord=ordOf(prefillOrder);
    if(ord){
      if(prefillKind==='hàng') p.party=ord.supplier||'';
      else if(prefillKind==='vận chuyển') p.party=ord.carrier||'';
    }
    if(!p.note) p.note=(prefillKind==='hàng'?'Thanh toán tiền hàng':'Thanh toán vận chuyển')+' đơn '+prefillOrder;
  }
  const oOpts=DB.orders.map(o=>`<option value="${esc(o.code)}" ${o.code===p.order?'selected':''}>${esc(o.code)} — ${esc((supOf(o.supplier)||{}).name||o.supplier)}</option>`).join('');
  const parties=poParties(p.order);
  const pOpts=parties.map(x=>`<option value="${esc(x.code)}" ${x.code===p.party?'selected':''}>${esc(x.code)} — ${esc(x.name)} (${x.role})</option>`).join('');
  // Tính số tiền gợi ý TRƯỚC khi render form
  if(!id && p.order && p.party){
    const rem = Math.round(poOpen(p.order, p.party));
    if(rem > 0) p.amount = rem;
  }
  const isEdit=!!id; const isPaid=p.status==='paid';
  openModal2(id?'Lệnh thanh toán '+esc(p.code):'Tạo lệnh thanh toán',`
    <div class="grid">
      <div class="fld"><label>Mã lệnh</label><input id="po_code" value="${esc(p.code)}" ${isPaid?'readonly':''}></div>
      <div class="fld"><label>Ngày lập</label><input type="date" id="po_date" value="${p.date}" ${isPaid?'readonly':''}></div>
      <div class="fld full"><label>Đơn nhập <span class="req">*</span></label>
        <select id="po_order" onchange="poOnOrder()" ${isEdit?'disabled':''}><option value="">— chọn đơn —</option>${oOpts}</select>
        <div class="err">Chọn đơn nhập.</div></div>
      <div class="fld full"><label>Đối tượng thanh toán <span class="req">*</span></label>
        <select id="po_party" onchange="poOnParty()" ${isEdit?'disabled':''}>${pOpts?pOpts:'<option value="">— chọn đơn trước —</option>'}</select>
        <div class="hint" id="po_hint"></div></div>
      <div class="fld"><label>Số tiền <span class="req">*</span></label>
        <input class="num" id="po_amount" value="${p.amount||''}" ${isPaid?'readonly':''}><div class="err">Nhập số tiền.</div></div>
      <div class="fld"><label>Ngày thanh toán dự kiến</label>
        <input type="date" id="po_due" value="${p.dueDate||''}" ${isPaid?'readonly':''}></div>
      <div class="fld full"><label>Nội dung / Ghi chú</label>
        <input id="po_note" value="${esc(p.note||'')}" placeholder="Ví dụ: Thanh toán tiền hàng đơn JZ tháng 6" ${isPaid?'readonly':''}></div>
      ${(p.status==='approved'||p.status==='paid')?`<div class="fld full"><div class="alert g"><span class="ic">✓</span><div>Đã duyệt bởi: <b>${esc(p.approvedBy||'—')}</b>${p.approvedAt?' ngày '+dshow(p.approvedAt):''}</div></div></div>`:''}
      ${p.status==='rejected'?`<div class="fld full"><div class="alert r"><span class="ic">✕</span><div>Lý do từ chối: <b>${esc(p.rejectReason||'—')}</b></div></div></div>`:''}
      ${p.status==='paid'?`<div class="fld full"><div class="alert g"><span class="ic">₫</span><div>Đã chuyển tiền ngày <b>${dshow(p.paidDate)}</b>${p.bankRef?' · Mã GD: <b>'+esc(p.bankRef)+'</b>':''}</div></div></div>`:''}
    </div>`,isPaid?null:()=>{
      const oc=$('#po_order').value; if(!oc){bad2('po_order');return false;}
      const pt=$('#po_party').value; if(!pt){bad2('po_party');return false;}
      const amt=N($('#po_amount').value); if(amt<=0){bad2('po_amount');return false;}
      const obj={id:id||nid(),code:$('#po_code').value.trim(),date:$('#po_date').value,
        order:isEdit?p.order:oc,party:isEdit?p.party:pt,amount:amt,
        dueDate:$('#po_due').value,status:p.status||'draft',paidDate:p.paidDate||'',
        bankRef:p.bankRef||'',approvedBy:p.approvedBy||'',approvedAt:p.approvedAt||'',
        rejectReason:p.rejectReason||'',note:$('#po_note').value.trim()};
      if(id)Object.assign(DB.porders.find(x=>x.id===id),obj);else DB.porders.push(obj);
      save(); closeModal2();
      // Refresh nội dung đơn nhập nếu đang mở
      const orderCode=obj.order; const box=$('#orderPayInfo');
      if(box) fillPayInfo(orderCode); else refresh();
      toast('Đã tạo lệnh thanh toán '+obj.code+' · Vào "Lệnh thanh toán" để duyệt & chi');
    });
  setTimeout(()=>poOnParty(), 0);
}
function approvePayOrder(id){
  const p=DB.porders.find(x=>x.id===id); if(!p)return;
  $('#modal2').className='modal';
  $('#modal2').innerHTML=`<div class="mh"><h3>Phê duyệt lệnh thanh toán</h3><div class="spacer"></div><button class="x" onclick="closeModal2()">✕</button></div>
    <div class="mb">
      <p style="margin:0 0 12px">Xác nhận <b>PHÊ DUYỆT</b> lệnh <b>${esc(p.code)}</b>?</p>
      <div class="alert b" style="margin-bottom:14px"><span class="ic">₫</span><div>
        Đơn: <b>${esc(p.order)}</b> · Đối tượng: <b>${esc((supOf(p.party)||{}).name||p.party)}</b><br>
        Số tiền: <b class="num">${fmt(p.amount)} ₫</b> · Ngày TT: <b>${dshow(p.dueDate)||'—'}</b><br>
        Nội dung: ${esc(p.note||'—')}
      </div></div>
      <div class="fld"><label>Người phê duyệt</label><input id="ap_by" value="${esc(DB.settings.repName||'')}" placeholder="Tên người phê duyệt"></div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal2()">Hủy</button>
      <button class="btn" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="doApprove(${id})">✓ Phê duyệt</button></div>`;
  $('#scrim2').classList.add('on');
}
function doApprove(id){
  const p=DB.porders.find(x=>x.id===id); if(!p)return;
  p.status='approved'; p.approvedBy=($('#ap_by')?$('#ap_by').value.trim():'')||DB.settings.repName||''; p.approvedAt=todayISO();
  save(); closeModal2(); if($('#orderPayInfo'))fillPayInfo(p.order); else refresh();
  toast('Đã phê duyệt lệnh '+p.code);
}
function rejectPayOrder(id){
  const p=DB.porders.find(x=>x.id===id); if(!p)return;
  $('#modal2').className='modal';
  $('#modal2').innerHTML=`<div class="mh"><h3>Từ chối lệnh thanh toán</h3><div class="spacer"></div><button class="x" onclick="closeModal2()">✕</button></div>
    <div class="mb">
      <p style="margin:0 0 12px">Từ chối lệnh <b>${esc(p.code)}</b> — <b>${fmt(p.amount)} ₫</b> cho <b>${esc((supOf(p.party)||{}).name||p.party)}</b>?</p>
      <div class="fld"><label>Lý do từ chối <span class="req">*</span></label><input id="rj_reason" placeholder="Nhập lý do từ chối…"></div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal2()">Hủy</button>
      <button class="btn danger" onclick="doReject(${id})">✕ Xác nhận từ chối</button></div>`;
  $('#scrim2').classList.add('on');
}
function doReject(id){
  const p=DB.porders.find(x=>x.id===id); if(!p)return;
  const reason=$('#rj_reason')?$('#rj_reason').value.trim():'';
  if(!reason){toast('Vui lòng nhập lý do từ chối',true);return;}
  p.status='rejected'; p.rejectReason=reason;
  save(); closeModal2(); if($('#orderPayInfo'))fillPayInfo(p.order); else refresh();
  toast('Đã từ chối lệnh '+p.code);
}
function markPaid(id){
  const p=DB.porders.find(x=>x.id===id); if(!p)return;
  if(p.status==='paid'){toast('Lệnh này đã hoàn thành rồi',true);return;}
  if(p.status==='rejected'){toast('Lệnh đã bị từ chối, không thể thanh toán',true);return;}
  $('#modal2').className='modal';
  $('#modal2').innerHTML=`<div class="mh"><h3>Xác nhận đã chuyển tiền</h3><div class="spacer"></div><button class="x" onclick="closeModal2()">✕</button></div>
    <div class="mb">
      <div class="alert g" style="margin-bottom:14px"><span class="ic">₫</span><div>
        Đơn: <b>${esc(p.order)}</b> · Đối tượng: <b>${esc((supOf(p.party)||{}).name||p.party)}</b><br>
        Số tiền: <b class="num">${fmt(p.amount)} ₫</b>
        ${p.approvedBy?`<br>Người duyệt: <b>${esc(p.approvedBy)}</b>`:''}
      </div></div>
      <div class="grid">
        <div class="fld"><label>Ngày chuyển thực tế <span class="req">*</span></label><input type="date" id="mk_date" value="${p.dueDate||todayISO()}"></div>
        <div class="fld"><label>Mã giao dịch ngân hàng</label><input id="mk_ref" placeholder="Mã GD / số chứng từ…" value="${esc(p.bankRef||'')}"></div>
        <div class="fld full"><label>Nội dung chuyển khoản</label><input id="mk_note" value="${esc(p.note||'Thanh toán đơn '+p.order+' ('+p.code+')')}"></div>
      </div>
    </div>
    <div class="mf"><button class="btn ghost" onclick="closeModal2()">Hủy</button>
      <button class="btn pri" onclick="doMarkPaid(${id})">✓ Xác nhận đã chuyển</button></div>`;
  $('#scrim2').classList.add('on');
}
function doMarkPaid(id){
  const p=DB.porders.find(x=>x.id===id); if(!p)return;
  const d=$('#mk_date')?$('#mk_date').value:todayISO();
  const ref=$('#mk_ref')?$('#mk_ref').value.trim():'';
  const note=$('#mk_note')?$('#mk_note').value.trim():'Thanh toán đơn '+p.order+' ('+p.code+')';
  DB.cash.push({id:nid(),date:d,txnType:'Chuyển khoản',objType:'Thương mại',objCode:p.party,bankRef:ref,content:note,cashIn:0,cashOut:N(p.amount),ref:p.code,order:p.order});
  p.status='paid'; p.paidDate=d; p.bankRef=ref;
  save(); closeModal2(); if($('#orderPayInfo'))fillPayInfo(p.order); else refresh();
  toast('Hoàn thành thanh toán đơn '+p.order);
}
function vPayOrders(){
  periodChip(); const list=DB.porders||[];
  const cntDraft=list.filter(p=>p.status==='draft').length;
  const cntApproved=list.filter(p=>p.status==='approved').length;
  const cntPaid=list.filter(p=>p.status==='paid').length;
  const lateDraft=list.filter(p=>p.status==='draft'&&p.dueDate&&daysBetween(todayISO(),p.dueDate)<0).length;
  const totalPending=list.filter(p=>p.status!=='paid'&&p.status!=='rejected').reduce((a,p)=>a+p.amount,0);
  const totalPaid=list.filter(p=>p.status==='paid').reduce((a,p)=>a+p.amount,0);
  const sorted=list.slice().sort((a,b)=>{
    const rank={draft:0,approved:1,paid:3,rejected:4}; const ra=rank[a.status]??2,rb=rank[b.status]??2;
    if(ra!==rb)return ra-rb; return (a.dueDate||'')<(b.dueDate||'')?-1:1;
  });
  let html=`<div class="panel flush"><div class="ph"><h2>Lệnh thanh toán (${list.length})</h2><div class="spacer"></div><button class="btn pri" onclick="editPayOrder()">+ Tạo lệnh</button></div>`;
  html+=`<div style="display:flex;gap:10px;padding:14px 18px 0;flex-wrap:wrap">
    <div class="kpi sm"><div class="kv">${cntDraft}</div><div class="kl">⏳ Chờ duyệt</div></div>
    <div class="kpi sm"><div class="kv">${cntApproved}</div><div class="kl">● Đã duyệt</div></div>
    <div class="kpi sm"><div class="kv">${cntPaid}</div><div class="kl">✓ Hoàn thành</div></div>
    <div class="kpi sm"><div class="kv num">${fmt(totalPending)}</div><div class="kl">₫ Còn phải chi</div></div>
    <div class="kpi sm"><div class="kv num">${fmt(totalPaid)}</div><div class="kl">₫ Đã chi</div></div>
  </div>`;
  html+=`<div class="wrap"><table class="tbl"><thead><tr>
    <th>Mã lệnh</th><th>Đơn nhập</th><th>Đối tượng / Nội dung</th>
    <th class="r">Số tiền</th><th>Ngày TT</th>
    <th class="c">Trạng thái</th><th>Hành động</th></tr></thead><tbody>`;
  if(!sorted.length) html+=emptyRow(7,'₫','Chưa có lệnh thanh toán. Tạo từ đây hoặc bấm "+ Tạo lệnh thanh toán" trong đơn nhập.');
  sorted.forEach(p=>{
    const sup=supOf(p.party);
    const actions=[];
    if(p.status==='draft'){
      actions.push(`<button class="btn sm" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="approvePayOrder(${p.id})">✓ Duyệt</button>`);
      actions.push(`<button class="btn sm danger" onclick="rejectPayOrder(${p.id})">✕</button>`);
      actions.push(`<button class="btn sm ghost" onclick="editPayOrder(${p.id})">Sửa</button>`);
    } else if(p.status==='approved'){
      actions.push(`<button class="btn sm pri" onclick="markPaid(${p.id})">₫ Xác nhận đã chuyển</button>`);
      actions.push(`<button class="btn sm ghost" onclick="editPayOrder(${p.id})">Xem</button>`);
    } else if(p.status==='rejected'){
      actions.push(`<button class="btn sm ghost" onclick="editPayOrder(${p.id})">Xem</button>`);
      actions.push(`<button class="btn sm danger" onclick="delRow('porders',${p.id})">Xóa</button>`);
    } else {
      actions.push(`<button class="btn sm ghost" onclick="editPayOrder(${p.id})">Xem</button>`);
    }
    html+=`<tr>
      <td class="code">${esc(p.code)}</td>
      <td class="code">${esc(p.order)}</td>
      <td><b>${esc(sup?sup.name:p.party)}</b>${p.note?`<div class="mut" style="font-size:11px">${esc(p.note.slice(0,45))}${p.note.length>45?'…':''}</div>`:''}
        ${p.approvedBy&&p.status!=='draft'?`<div class="mut" style="font-size:11px">Duyệt: ${esc(p.approvedBy)}</div>`:''}</td>
      <td class="r num">${fmt(p.amount)}</td>
      <td class="num">${dshow(p.dueDate)||'<span class="mut">—</span>'}</td>
      <td class="c">${poStatusTag(p)}</td>
      <td class="r act" style="white-space:nowrap">${actions.join(' ')}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  if(lateDraft) html+=`<div class="alert r" style="margin:0 0 8px"><span class="ic">⚠</span><div><b>${lateDraft}</b> lệnh <b>chờ duyệt đã quá hạn</b> — cần phê duyệt gấp.</div></div>`;
  if(cntApproved) html+=`<div class="alert b" style="margin:0 0 8px"><span class="ic">●</span><div><b>${cntApproved}</b> lệnh <b>đã duyệt, chờ chuyển tiền</b> — kế toán xác nhận sau khi chuyển xong.</div></div>`;
  html+=`<div class="alert a" style="margin:0"><span class="ic">i</span><div><b>Quy trình 3 bước:</b> <b>1.</b> Tạo lệnh (Chờ duyệt) → <b>2.</b> Giám đốc/kế toán Phê duyệt → <b>3.</b> Kế toán chuyển tiền & Xác nhận đã chuyển (lưu mã GD ngân hàng). Mỗi bước cần hành động riêng, hệ thống ghi nhận đầy đủ.</div></div>`;
  $('#view').innerHTML=html;
}

let CUR="dashboard";
function renderNav(){
  const n=$('#nav'); n.innerHTML='';
  NAV.forEach(grp=>{
    const g=document.createElement('div'); g.className='grp'; g.textContent=grp.g; n.appendChild(g);
    grp.items.forEach(it=>{
      const a=document.createElement('a'); a.href='#'+it.id; a.className=(it.id===CUR?'on':'');
      a.innerHTML=`<span class="ic">${it.ic}</span>${it.t}`;
      a.onclick=e=>{e.preventDefault();go(it.id);};
      n.appendChild(a);
    });
  });
}
function meta(id){ for(const g of NAV)for(const it of g.items)if(it.id===id)return it; return {t:'',sub:''}; }
function go(id){
  CUR=id; const m=meta(id);
  $('#pageTitle').textContent=m.t; $('#pageSub').textContent=m.sub;
  document.getElementById('side').classList.remove('open');
  renderNav(); window.scrollTo(0,0);
  ({dashboard:vDashboard,orders:vOrders,quotes:vQuotes,sorders:vSOrders,sales:vSales,opex:vOpex,cash:vCash,inventory:vInventory,
    reorder:vReorder,ar:vAR,ap:vAP,pricelist:vPriceList,products:vProducts,suppliers:vSuppliers,customers:vCustomers,
    cashflow:vCashflow,aging:vAging,docctrl:vDocCtrl,vat:vVat,profit:vProfit,payorders:vPayOrders,
    settings:vSettings,backup:vBackup}[id]||vDashboard)();
  document.querySelectorAll('#view input.num').forEach(i=>i.setAttribute('inputmode','decimal'));
  addTableSearch();
}
function refresh(){ go(CUR); }

function vDashboard(){
  periodChip();
  const inv=inventory(); const arr=ar(); const apr=ap();
  const rev=salesRows().reduce((a,s)=>a+s.revenue,0);
  const cogs=salesRows().reduce((a,s)=>a+s.cogs,0);
  const gp=rev-cogs;
  const op=DB.opex.reduce((a,o)=>a+N(o.amount),0);
  const profit=gp-op;
  const purchased=DB.orders.reduce((a,o)=>a+orderCalc(o.code).inbound,0);
  const endVal=Object.values(inv).reduce((a,m)=>a+m.endValue,0);
  const endQty=Object.values(inv).reduce((a,m)=>a+m.endQty,0);
  const arTot=arr.reduce((a,x)=>a+Math.max(0,x.outstanding),0);
  const apTot=apr.reduce((a,x)=>a+Math.max(0,x.outstanding),0);
  const cash=cashBalance();

/* ----- EXCEL IMPORT / TEMPLATE / RESET ----- */
let _XLSX = null; // SheetJS lazy-loaded
function _loadSheetJS(cb){
  if(_XLSX){ cb(_XLSX); return; }
  if(window.XLSX){ _XLSX=window.XLSX; cb(_XLSX); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.mini.min.js';
  s.onload = () => { _XLSX=window.XLSX; cb(_XLSX); };
  s.onerror = () => {
    // Fallback: thử jsdelivr
    const s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js';
    s2.onload = () => { _XLSX=window.XLSX; cb(_XLSX); };
    s2.onerror = () => cb(null);
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}
function _xlsxParse(file, onRows){
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext === 'csv'){
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split(/\r?\n/).map(l=>{
        // CSV parse đơn giản (xử lý quoted fields)
        const cells=[]; let cur='', inQ=false;
        for(let i=0;i<l.length;i++){
          if(l[i]==='"'){ inQ=!inQ; }
          else if(l[i]===','&&!inQ){ cells.push(cur.trim()); cur=''; }
          else cur+=l[i];
        }
        cells.push(cur.trim());
        return cells;
      });
      onRows(lines.filter(r=>r.some(v=>v)));
    };
    reader.readAsText(file, 'utf-8');
    return;
  }
  // .xls SpreadsheetML (file tôi tạo bằng _makeXLS)
  if(ext === 'xls'){
    const reader = new FileReader();
    reader.onload = e => {
      const txt = e.target.result;
      const rows = [];
      try {
        const doc = new DOMParser().parseFromString(txt, 'text/xml');
        doc.querySelectorAll('Row').forEach(tr => {
          const cells = [];
          tr.querySelectorAll('Cell').forEach(td => {
            const idx = td.getAttribute('ss:Index');
            if(idx){ while(cells.length < +idx-1) cells.push(''); }
            cells.push((td.querySelector('Data')||{textContent:''}).textContent.trim());
          });
          if(cells.some(v=>v)) rows.push(cells);
        });
        if(rows.length){ onRows(rows); return; }
      } catch(e){}
      // Fallback: thử SheetJS cho .xls BIFF
      _loadSheetJS(XLSX => {
        if(!XLSX){ toast('Không đọc được file .xls — hãy dùng .xlsx hoặc .csv', true); return; }
        const reader2 = new FileReader();
        reader2.onload = ev => {
          try {
            const wb = XLSX.read(ev.target.result, {type:'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
            onRows(data.map(r=>r.map(v=>v===null||v===undefined?'':String(v))).filter(r=>r.some(v=>v)));
          } catch(ex){ toast('Lỗi đọc file: '+ex.message, true); }
        };
        reader2.readAsArrayBuffer(file);
      });
    };
    reader.readAsText(file, 'utf-8');
    return;
  }
  // .xlsx — cần SheetJS
  _loadSheetJS(XLSX => {
    if(!XLSX){
      toast('Cần kết nối internet để đọc file .xlsx lần đầu. Hoặc dùng .csv để không cần mạng.', true);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        onRows(data.map(r=>r.map(v=>v===null||v===undefined?'':String(v))).filter(r=>r.some(v=>v)));
      } catch(ex){ toast('Lỗi đọc file .xlsx: '+ex.message, true); }
    };
    reader.readAsArrayBuffer(file);
  });
}
function _pickExcel(cb){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.xls,.xlsx,.csv';
  inp.onchange = () => { if(inp.files[0]) cb(inp.files[0]); };
  inp.click();
}

// ── Tạo XML SpreadsheetML (xls) ─────────────────────────
function _makeXLS(sheetName, rows){
  const xe = v => String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cell = v => typeof v==='number'&&isFinite(v)
    ? `<Cell><Data ss:Type="Number">${v}</Data></Cell>`
    : `<Cell><Data ss:Type="String">${xe(v)}</Data></Cell>`;
  const hcell = v => `<Cell ss:StyleID="h"><Data ss:Type="String">${xe(v)}</Data></Cell>`;
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="h"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#13203A" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style></Styles><Worksheet ss:Name="${xe(sheetName)}"><Table>`;
  rows.forEach((r,i) => {
    xml += '<Row>' + (i===0 ? r.map(hcell) : r.map(cell)).join('') + '</Row>';
  });
  xml += '</Table></Worksheet></Workbook>';
  return xml;
}
function _downloadXLS(xml, fname){
  try {
    const blob = new Blob(['\ufeff'+xml], {type:'application/vnd.ms-excel'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast('Đã tải template — điền vào rồi dùng nút "⬆ Nhập từ Excel"');
  } catch(err){ toast('Lỗi: '+err.message, true); }
}

/* ----- generic catalog table helpers ----- */
function searchBox(ph,oninput){ return `<div class="search"><span class="ic">⌕</span><input placeholder="${ph}" oninput="${oninput}"></div>`; }
function _norm(s){ return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d'); }
function _rowDates(tr){
  const m=tr.textContent.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/g)||[];
  return m.map(s=>{const a=s.split('/');return a[2]+'-'+a[1].padStart(2,'0')+'-'+a[0].padStart(2,'0');});
}
function _haystack(tr){
  let h=tr.textContent;
  _rowDates(tr).forEach(iso=>{const a=iso.split('-');h+=' '+iso+' '+a[1]+'/'+a[0]+' '+(+a[1])+'/'+a[0]+' '+(+a[2])+'/'+(+a[1])+'/'+a[0];});
  return _norm(h);
}
function filterTable(el){
  const panel=el.closest('.panel'); if(!panel)return;
  const si=panel.querySelector('.tfilter .search input'); const q=_norm((si?si.value:'').trim());
  const fr=panel.querySelector('.tfilter .dfrom'); const from=fr?fr.value:'';
  const tt=panel.querySelector('.tfilter .dto'); const to=tt?tt.value:'';
  panel.querySelectorAll('table.tbl > tbody').forEach(tb=>{
    let shown=0,total=0;
    tb.querySelectorAll(':scope > tr').forEach(tr=>{
      if(tr.querySelector('.empty')) return; total++;
      let ok=true;
      if(q) ok=_haystack(tr).includes(q);
      if(ok&&(from||to)){ const d=(_rowDates(tr)[0]||''); if(!d) ok=false; else { if(from&&d<from)ok=false; if(to&&d>to)ok=false; } }
      tr.style.display=ok?'':'none'; if(ok)shown++;
    });
    let hint=tb.parentNode.parentNode.querySelector('.noresult');
    if((q||from||to)&&shown===0&&total>0){ if(!hint){hint=document.createElement('div');hint.className='noresult';tb.parentNode.parentNode.appendChild(hint);} hint.style.display=''; hint.textContent='Không tìm thấy dòng nào khớp bộ lọc.'; }
    else if(hint){ hint.style.display='none'; }
  });
}
function clearFilter(btn){ const panel=btn.closest('.panel'); if(!panel)return;
  const si=panel.querySelector('.tfilter .search input'); if(si)si.value='';
  const fr=panel.querySelector('.dfrom'); if(fr)fr.value=''; const tt=panel.querySelector('.dto'); if(tt)tt.value='';
  filterTable(si||fr); }
function addTableSearch(){
  document.querySelectorAll('#view .panel').forEach(panel=>{
    const ph=panel.querySelector('.ph'); const table=panel.querySelector('table.tbl');
    if(!ph||!table) return;
    if(ph.querySelector('.tfilter')||ph.querySelector('.search')) return;
    const tb=table.querySelector('tbody'); if(!tb) return;
    const rows=tb.querySelectorAll(':scope > tr');
    if(rows.length===0 || (rows.length===1 && rows[0].querySelector('.empty'))) return;
    let hasDate=false; for(const tr of rows){ if(!tr.querySelector('.empty') && _rowDates(tr).length){ hasDate=true; break; } }
    const bar=document.createElement('div'); bar.className='tfilter';
    bar.innerHTML='<div class="search"><span class="ic">⌕</span><input placeholder="Tìm mã đơn, tên, nội dung…" oninput="filterTable(this)"></div>'
      + (hasDate? '<span class="dsep">Từ</span><input type="date" class="dfrom" oninput="filterTable(this)"><span class="dsep">đến</span><input type="date" class="dto" oninput="filterTable(this)"><button class="btn sm ghost" onclick="clearFilter(this)">Xóa lọc</button>' : '');
    let spacer=ph.querySelector('.spacer'); if(!spacer){spacer=document.createElement('div');spacer.className='spacer';ph.appendChild(spacer);}
    ph.insertBefore(bar, spacer.nextSibling);
  });
}

    html+=`<tr>

      <td>${esc(sup?sup.name:o.supplier)}${o.carrier?`<div class="mut" style="font-size:11px">🌐 VC QT: ${esc(o.carrier)}</div>`:''}${o.domesticCarrier?`<div class="mut" style="font-size:11px">🚛 VC NĐ: ${esc(o.domesticCarrier)}</div>`:''}</td>
      <td class="c">${st}</td>
      <td class="r num">${fmt(c.qty)}</td>

      <td class="c"><div style="display:flex;align-items:center;gap:6px;justify-content:center" title="${dc.done}/${dc.applicable} hoàn thành · ${dc.na} không dùng"><div class="bar" style="width:54px"><i style="width:${(dp*100).toFixed(0)}%;background:${dp>=1?'var(--green)':'var(--amber)'}"></i></div><span class="num mut" style="font-size:11px">${dc.done}/${dc.applicable}</span></div></td>

  html+=`</tbody></table></div></div>`;
  $('#view').innerHTML=html;
}

      <div class="fld"><label>Phí ngân hàng</label><input class="num" id="f_bank" value="${o.bankFee}" oninput="lineSummary()"></div>

      <div class="section-t">Hồ sơ chứng từ <span class="dt-note">— chọn “Hoàn thành” hoặc “Không sử dụng” cho từng loại</span></div>
      <div class="full">
        <div class="docbar">
          <button type="button" class="btn sm" onclick="docFillNA()">Các mục trống → Không sử dụng</button>

          <div class="spacer" style="flex:1"></div>

        </div>
        <div id="docGrid">${dl.map(([k,t])=>`<div class="docitem"><div class="dlab">${t}</div><label class="dopt done ${dval(k)==='done'?'on':''}"><input type="checkbox" data-k="${k}" data-v="done" ${dval(k)==='done'?'checked':''} onchange="docPick(this)">Hoàn thành</label><label class="dopt na ${dval(k)==='na'?'on':''}"><input type="checkbox" data-k="${k}" data-v="na" ${dval(k)==='na'?'checked':''} onchange="docPick(this)">Không sử dụng</label></div>`).join('')}</div>
      </div>

      <div class="full" id="orderSummary" style="margin-top:14px"></div>

      const c=$('#f_code').value.trim(), sup=$('#f_sup').value;
      let ok=true;

      const docs={}; document.querySelectorAll('#docGrid input').forEach(i=>{ if(i.checked) docs[i.dataset.k]=i.dataset.v; });

}
function fillPayInfo(code, expandKind){
  const box=$('#orderPayInfo'); if(!box)return;
  const o=ordOf(code); if(!o)return;
  const ps=orderPayStatus(code);
  const items=payableItems().filter(x=>x.order===code);
  const lttList=(DB.porders||[]).filter(p=>p.order===code).sort((a,b)=>(a.date||'')<(b.date||'')?1:-1);

  const stColor=ps.status==='paid'?'g':ps.status==='partial'?'a':'r';
  const stLabel=ps.status==='paid'?'✓ Đã thanh toán đủ':ps.status==='partial'?'Trả một phần':ps.status==='none'?'—':'Chưa thanh toán';
  const kindIcon=k=>k==='hàng'?'💰':k.includes('quốc tế')?'🌐':k.includes('nội địa')?'🚛':'🚚';
  const kindLabel=k=>k==='hàng'?'Tiền hàng':k.includes('quốc tế')?'VC quốc tế':k.includes('nội địa')?'VC nội địa':'Vận chuyển';

  let html=`<div class="po-panel">
    <div class="po-hd">
      <span class="po-title">₫ Quản lý thanh toán</span>
      <span class="tag ${stColor}" style="font-size:12px">${stLabel}</span>
      <div class="spacer"></div>
      <span class="mut" style="font-size:11px">Tổng: <b class="num">${fmt(ps.amount)}</b> · Đã trả: <b class="num pos">${fmt(ps.paid)}</b>${ps.open>0.5?` · Còn: <b class="num neg">${fmt(ps.open)}</b>`:' · <b class="num pos">✓</b>'}</span>
    </div>`;

  // Từng khoản
  items.forEach(it=>{
    const open=it.open>0.5;
    const pending=lttList.filter(p=>p.party===it.party&&(p.status==='draft'||p.status==='approved')).reduce((a,p)=>a+p.amount,0);
    // Số tiền chưa được bao phủ bởi lệnh nào (kể cả lệnh đang chờ)
    const effectiveOpen=Math.max(0,it.open-pending);
    const needNew=effectiveOpen>0.5;
    // Thanh progress tính cả tiền đã chi lẫn lệnh đang chờ
    const allocated=it.amount-it.open; // tiền đã chi thực tế
    const pct=it.amount>0?Math.min(100,Math.round((allocated+pending)/it.amount*100)):100;
    const cashPct=it.amount>0?Math.round(allocated/it.amount*100):100;
    const isExpanded = expandKind===it.kind;
    const supName=esc((supOf(it.party)||{}).name||it.party);
    // Trạng thái hiển thị khoản
    const khoanClass=!open?'done':(!needNew?'pending':'open');

    html+=`<div class="po-khoan ${khoanClass}">
      <div class="po-khoan-hd">
        <b>${kindIcon(it.kind)} ${kindLabel(it.kind)}</b>
        <span class="mut" style="font-size:11px">${supName}</span>
        <div class="po-bar-bg" style="width:90px;margin:0 8px" title="Xanh: đã chi · Vàng: đang có lệnh chờ duyệt">
          <div class="po-bar-fill" style="width:${pct}%;background:${pending>0&&open?'var(--amber)':''}"></div>
        </div>
        <span class="num" style="font-size:11px;min-width:28px">${pct}%</span>
        <div class="spacer"></div>
        <span class="num" style="font-size:11px">${fmt(allocated)}/${fmt(it.amount)} ₫</span>
        ${open&&needNew&&!isExpanded?`<button class="btn sm pri" style="margin-left:8px" onclick="quickPayOrder(${JSON.stringify(code)},${JSON.stringify(it.kind)},${JSON.stringify(it.party)})">⚡ Tạo ngay</button><button class="btn sm ghost" style="margin-left:4px" onclick="fillPayInfo(${JSON.stringify(code)},${JSON.stringify(it.kind)})">✏ Tùy chỉnh</button>`:''}
        ${!open?'<span class="tag g" style="font-size:11px;margin-left:8px">✓ Xong</span>':(!needNew?'<span class="tag a" style="font-size:11px;margin-left:8px">⏳ Đang xử lý</span>':'')}
      </div>
      ${pending>0?`<div style="padding:2px 0 4px;font-size:11px;color:var(--amber)">⏳ Lệnh đang chờ xử lý: <b>${fmt(pending)} ₫</b>${effectiveOpen>0.5?` · Chưa lập lệnh: <b>${fmt(effectiveOpen)} ₫</b>`:' · Đã phủ toàn bộ'}</div>`:''}`;

    // ── INLINE FORM tạo lệnh mới ──
    if(isExpanded && open){
      const nextCode=nextPOrderCode();
      const rem=Math.round(it.open);
      const defNote=(it.kind==='hàng'?'Thanh toán tiền hàng':'Thanh toán '+kindLabel(it.kind).toLowerCase())+' đơn '+code;
      html+=`<div class="po-form">
        <div class="po-form-hd">✏ Tạo lệnh thanh toán — ${kindIcon(it.kind)} ${kindLabel(it.kind)} · ${supName}</div>
        <div class="po-form-grid">
          <div class="po-form-fld"><label>Mã lệnh</label><input id="pof_code" value="${esc(nextCode)}"></div>
          <div class="po-form-fld"><label>Ngày lập</label><input type="date" id="pof_date" value="${todayISO()}"></div>
          <div class="po-form-fld"><label>Số tiền ₫</label><input class="num" id="pof_amt" value="${rem}"><div class="hint">Còn phải trả: <b>${fmt(rem)} ₫</b></div></div>
          <div class="po-form-fld"><label>Ngày TT dự kiến</label><input type="date" id="pof_due" value=""></div>
          <div class="po-form-fld wide"><label>Nội dung / Ghi chú</label><input id="pof_note" value="${esc(defNote)}"></div>
        </div>
        <div class="po-form-acts">
          <button class="btn ghost" onclick="fillPayInfo(${JSON.stringify(code)})">Hủy</button>
          <button class="btn pri" onclick="saveInlinePayOrder(${JSON.stringify(code)},${JSON.stringify(it.kind)},${JSON.stringify(it.party)})">💾 Lưu lệnh thanh toán</button>
        </div>
      </div>`;
    }
    html+=`</div>`;
  });

  if(!items.length){
    html+=`<div class="po-empty">Đơn chưa có thông tin phải trả (chưa nhập kho hoặc giá trị = 0).</div>`;
  }

  // Danh sách lệnh TT của đơn này
  if(lttList.length){
    html+=`<div class="po-ltt-hd">Lệnh thanh toán của đơn (${lttList.length})</div>
    <table class="po-tbl"><thead><tr><th>Mã lệnh</th><th>Khoản</th><th>Đối tượng</th><th class="r">Số tiền</th><th>Ngày TT</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>`;
    lttList.forEach(p=>{
      const sup=supOf(p.party);
      const actions=[];
      if(p.status==='draft'){
        actions.push(`<button class="btn sm" style="background:var(--green);color:#fff;border-color:var(--green);padding:3px 8px;font-size:11px" onclick="approvePayOrder(${p.id})">✓ Duyệt</button>`);
        actions.push(`<button class="btn sm danger" style="padding:3px 8px;font-size:11px" onclick="rejectPayOrder(${p.id})">✕</button>`);
      } else if(p.status==='approved'){
        actions.push(`<button class="btn sm pri" style="padding:3px 8px;font-size:11px" onclick="markPaid(${p.id})">₫ Chi tiền</button>`);
      }
      actions.push(`<button class="btn sm ghost" style="padding:3px 8px;font-size:11px" onclick="editPayOrder(${p.id})">Xem</button>`);
      // tìm kind của lệnh này từ payableItems
      const pItem=payableItems().find(x=>x.order===p.order&&x.party===p.party);
      const pKind=pItem?kindIcon(pItem.kind)+' '+kindLabel(pItem.kind):'';
      html+=`<tr>
        <td class="code" style="font-size:11px">${esc(p.code)}</td>
        <td style="font-size:11px">${pKind}</td>
        <td style="font-size:11px">${esc(sup?sup.name:p.party)}</td>
        <td class="r num" style="font-size:11px">${fmt(p.amount)}</td>
        <td class="num" style="font-size:11px">${dshow(p.dueDate)||'—'}</td>
        <td>${poStatusTag(p)}</td>
        <td class="r act" style="white-space:nowrap">${actions.join(' ')}</td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  } else if(items.some(it=>it.open>0.5)){
    html+=`<div class="po-empty mut" style="padding:8px 14px">Chưa có lệnh nào. Bấm "+ Tạo lệnh TT" ở khoản còn nợ.</div>`;
  }

  html+=`</div>`;
  box.innerHTML=html;
}

function saleCalc(editId){
  const prod=$('#f_prod')?$('#f_prod').value:''; if(!$('#c_sugg'))return;
  const qty=N($('#f_qty').value), price=N($('#f_price').value);
  const sugg=prod?suggestedPrice(prod):0;
  const inv=inventory(); const m=prod?inv[prod]:null;
  let stock=m?m.endQty:0;
  // when editing, add back this row qty so it isn't double-counted
  if(editId){ const old=DB.sales.find(x=>x.id===editId); if(old&&old.product===prod) stock+=N(old.qty); }
  $('#c_sugg').textContent=prod?fmt(sugg)+' ₫':'—';
  const av=prod?availability(prod, null):null;
  $('#c_stock').innerHTML=prod?`<span class="${stock<qty?'neg':''}">${fmt(stock)}</span>${av&&av.incoming?` <span class="mut" style="font-size:11px">· đang về ${fmt(av.incoming)}${av.nextEta?' ('+dshow(av.nextEta)+')':''}</span>`:''}`:'—';
  const box=$('#saleBox'); if(!box)return;
  if(!prod){box.innerHTML='';return;}
  const cost=m?m.avgCost:0; const rev=qty*price; const cogs=qty*cost; const gp=rev-cogs;
  let warn='';
  if(qty>stock) warn=`<div class="alert a"><span class="ic">⚠</span><div>Số lượng bán (${fmt(qty)}) lớn hơn tồn hiện có (${fmt(stock)}). Có thể bán nhưng tồn kho sẽ âm.</div></div>`;
  if(price<sugg && price>0) warn+=`<div class="alert a"><span class="ic">↓</span><div>Đơn giá thấp hơn giá đề xuất ${fmt(sugg)} ₫.</div></div>`;
  box.innerHTML=`${warn}<div class="alert g"><span class="ic">∑</span><div>Doanh thu <b class="num">${fmt(rev)}</b> · Giá vốn <b class="num">${fmt(cogs)}</b> · <b>Lãi gộp <span class="num ${gp<0?'neg':''}">${fmt(gp)} ₫</span></b></div></div>`;
}

function cashOrderOpts(suppCode, selectedOrder){
  if(!suppCode) return '<option value="">— không gắn —</option>';
  const items = payableItems().filter(x=>x.party===suppCode && x.open>0.5);
  if(!items.length) return '<option value="">— không có đơn còn nợ —</option>';
  const seen = new Set();
  let opts = '<option value="">— không gắn vào đơn cụ thể —</option>';
  items.forEach(it=>{
    if(seen.has(it.order)) return; seen.add(it.order);
    const ps = orderPayStatus(it.order);
    opts += `<option value="${esc(it.order)}" ${it.order===selectedOrder?'selected':''}>${esc(it.order)} · còn ${fmt(ps.open)} ₫</option>`;
  });
  // Nếu đơn đang chọn không còn trong items (đã trả đủ) nhưng vẫn cần hiển thị
  if(selectedOrder && !seen.has(selectedOrder)){
    opts += `<option value="${esc(selectedOrder)}" selected>${esc(selectedOrder)}</option>`;
  }
  return opts;
}

/* ----- INVENTORY ----- */
function vInventory(){
  periodChip();
  const inv=inventory(); const arr=Object.values(inv);
  let html=`<div class="panel flush"><div class="ph"><h2>Tồn kho &amp; giá vốn bình quân</h2><div class="spacer"></div><span class="tag n">Tự động · không nhập tay</span></div><div class="wrap"><table class="tbl"><thead><tr><th>Mã</th><th>Tên</th><th class="r">Đầu kỳ SL</th><th class="r">Nhập SL</th><th class="r">Bán SL</th><th class="r">Tồn cuối SL</th><th class="r">Giá vốn BQ</th><th class="r">Tồn cuối GT</th><th class="r">Chờ nhập</th><th class="c">Cảnh báo</th><th></th></tr></thead><tbody>`;
  let tv=0,tq=0;
  arr.forEach(m=>{
    if(!(m.beginQty||m.inQty||m.soldQty||m.endQty||m.pendingQty))return;
    tv+=m.endValue;tq+=m.endQty;
    const warn=m.endQty<0?'<span class="tag r">Âm kho</span>':(m.pendingQty>0?'<span class="tag a">Chờ nhập</span>':'<span class="tag g">OK</span>');
    html+=`<tr><td class="code">${esc(m.code)}</td><td>${esc(nameVI(m.p))}</td><td class="r num">${fmt(m.beginQty)}</td><td class="r num">${fmt(m.inQty)}</td><td class="r num">${fmt(m.soldQty)}</td><td class="r num ${m.endQty<0?'neg':''}">${fmt(m.endQty)}</td><td class="r num">${fmt(m.avgCost)}</td><td class="r num">${fmt(m.endValue)}</td><td class="r num mut">${m.pendingQty?fmt(m.pendingQty):''}</td><td class="c">${warn}</td></tr>`;
  });
  html+=`</tbody><tfoot class="foot"><tr><td colspan="5">Tổng tồn cuối kỳ</td><td class="r">${money(tq)}</td><td></td><td class="r">${money(tv)}</td><td colspan="2"></td></tr></tfoot></table></div></div>`;
  $('#view').innerHTML=html;
}
